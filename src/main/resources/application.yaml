spring:
  application:
    name: bookstoreapp
  datasource:
    url: jdbc:postgresql://localhost:5432/bookstore
    username: postgres
    password: '0001'
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update  # create, update, validate, none
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true
          jdbc:
            batch_size: 20
      open-in-view: false
